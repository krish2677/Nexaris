version: "3.9"

services:
  # ── FastAPI Backend ──
  backend:
    build: .
    container_name: desci-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    # Run migrations before starting the server
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis (task cache, pub/sub, rate limiting) ──
  redis:
    image: redis:7-alpine
    container_name: desci-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy (HTTPS + HTTP redirect) ──
  nginx:
    image: nginx:alpine
    container_name: desci-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ── Prometheus (monitoring) ──
  prometheus:
    image: prom/prometheus:latest
    container_name: desci-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  # ── Grafana (dashboards) ──
  grafana:
    image: grafana/grafana:latest
    container_name: desci-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=desci_admin
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
